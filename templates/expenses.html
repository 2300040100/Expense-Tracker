{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-receipt fa-3x text-primary mb-3"></i>
                    <h4 class="fw-bold">{{ 'Edit Expense' if expense else 'Add Expense' }}</h4>
                    <p class="text-muted">{{ 'Update the details below' if expense else 'Fill in the details below' }}</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Title</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-tag"></i></span>
                            <input type="text" name="title" class="form-control" 
                                   placeholder="e.g. Lunch, Bus ticket"
                                   value="{{ expense.title if expense else '' }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Amount (₹)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-rupee-sign"></i></span>
                            <input type="number" name="amount" class="form-control" 
                                   placeholder="0.00" step="0.01" min="0"
                                   value="{{ expense.amount if expense else '' }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Category</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-list"></i></span>
                            <select name="category" class="form-select" required>
                                <option value="">Select category</option>
                                {% set categories = ['Food', 'Transport', 'Shopping', 'Entertainment', 
                                                     'Healthcare', 'Education', 'Utilities', 'Other'] %}
                                {% for cat in categories %}
                                    <option value="{{ cat }}" 
                                        {{ 'selected' if expense and expense.category == cat else '' }}>
                                        {{ cat }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Date</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-calendar"></i></span>
                            <input type="date" name="date" class="form-control"
                                   value="{{ expense.date.strftime('%Y-%m-%d') if expense else '' }}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Description (optional)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-comment"></i></span>
                            <input type="text" name="description" class="form-control" 
                                   placeholder="Any additional notes"
                                   value="{{ expense.description if expense else '' }}">
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary py-2 fw-semibold">
                            <i class="fas fa-save me-2"></i>{{ 'Update Expense' if expense else 'Add Expense' }}
                        </button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary py-2">
                            <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
